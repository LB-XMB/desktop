name: Build LBXMB Full - All Platforms

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
        default: 'https://lbxmb.fr'

      name:
        description: 'App name (lowercase)'
        required: true
        default: 'lbxmb'

      title:
        description: 'Titre de la fenêtre'
        required: false
        default: 'LBXMB'

      description:
        description: 'Description de l application'
        required: false
        default: 'Application desktop officielle pour lbxmb.fr'

      author:
        description: 'Auteur'
        required: false
        default: 'LBXMB'

      icon:
        description: 'URL de l icône PNG'
        required: false
        default: 'https://lbxmb.fr/lbxmb.png'

      width:
        description: 'Largeur fenêtre (px)'
        required: false
        default: '1200'

      height:
        description: 'Hauteur fenêtre (px)'
        required: false
        default: '780'

      targets:
        description: 'Formats à générer'
        required: false
        default: 'exe,msi,dmg,appimage,deb,rpm'

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm (version 9 - stable for Pake)
        uses: pnpm/action-setup@v4
        with:
          version: 9   # ← Changement important : on passe en v9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Pake CLI
        run: pnpm run cli:build

      - name: Build Application (Linux)
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")
          [[ -n "${{ inputs.title }}" ]] && ARGS+=("--title" "${{ inputs.title }}")
          [[ -n "${{ inputs.icon }}" ]] && ARGS+=("--icon" "${{ inputs.icon }}")
          [[ -n "${{ inputs.width }}" ]] && ARGS+=("--width" "${{ inputs.width }}")
          [[ -n "${{ inputs.height }}" ]] && ARGS+=("--height" "${{ inputs.height }}")
          [[ -n "${{ inputs.description }}" ]] && ARGS+=("--description" "${{ inputs.description }}")
          [[ -n "${{ inputs.author }}" ]] && ARGS+=("--author" "${{ inputs.author }}")

          ARGS+=("--targets" "${{ inputs.targets }}")

          echo "🚀 Build Linux avec icône : ${{ inputs.icon }}"
          node dist/cli.js "${ARGS[@]}"

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: lbxmb-linux
          path: |
            *.AppImage
            *.deb
            *.rpm
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm (version 9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Pake CLI
        run: pnpm run cli:build

      - name: Build Application (Windows)
        run: |
          $args = "${{ inputs.url }}", "--name", "${{ inputs.name }}"
          if ("${{ inputs.icon }}" -ne "") { $args += "--icon", "${{ inputs.icon }}" }
          if ("${{ inputs.title }}" -ne "") { $args += "--title", "${{ inputs.title }}" }
          if ("${{ inputs.width }}" -ne "") { $args += "--width", "${{ inputs.width }}" }
          if ("${{ inputs.height }}" -ne "") { $args += "--height", "${{ inputs.height }}" }

          Write-Host "🚀 Build Windows avec icône : ${{ inputs.icon }}"
          node dist/cli.js $args

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: lbxmb-windows
          path: |
            *.exe
            *.msi
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm (version 9)
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build Pake CLI
        run: pnpm run cli:build

      - name: Build Application (macOS)
        run: |
          ARGS=("${{ inputs.url }}" "--name" "${{ inputs.name }}")
          [[ -n "${{ inputs.icon }}" ]] && ARGS+=("--icon" "${{ inputs.icon }}")
          [[ -n "${{ inputs.title }}" ]] && ARGS+=("--title" "${{ inputs.title }}")
          [[ -n "${{ inputs.width }}" ]] && ARGS+=("--width" "${{ inputs.width }}")
          [[ -n "${{ inputs.height }}" ]] && ARGS+=("--height" "${{ inputs.height }}")

          echo "🚀 Build macOS avec icône : ${{ inputs.icon }}"
          node dist/cli.js "${ARGS[@]}"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v6
        with:
          name: lbxmb-macos
          path: "*.dmg"
          retention-days: 7
